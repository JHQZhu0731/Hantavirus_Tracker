name: Daily data fetch + rebuild

# ──────────────────────────────────────────────────────────────────────────────
# What this does
# ──────────────────────────────────────────────────────────────────────────────
# 1. Fetches the ECDC Andes hantavirus surveillance page once a day.
# 2. Parses confirmed / probable / suspected / deaths counts.
# 3. Updates data/cruise_outbreak_2026.json and data/outbreaks.json if the
#    numbers changed.
# 4. Rebuilds index.html AND zh/index.html from the updated data.
# 5. Commits and pushes all changed files (data + HTML).
#
# This runs at 08:00 UTC (4 AM US East) — after ECDC typically publishes its
# 14:00 CET daily update from the previous day.  You can also trigger it
# manually from the GitHub Actions tab.
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC daily
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write           # needed to push data files + HTML

jobs:
  fetch-and-rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Step 1: fetch latest case counts and update JSON ──────────────────
      - name: Fetch latest data from ECDC
        run: python3 scripts/fetch_data.py

      # ── Step 2: rebuild both HTML pages from (possibly updated) JSON ──────
      - name: Rebuild HTML (English + Chinese)
        run: python3 scripts/build_tracker.py

      # ── Step 3: commit and push everything that changed ───────────────────
      - name: Commit and push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/cruise_outbreak_2026.json \
                  data/outbreaks.json \
                  index.html \
                  zh/index.html

          if git diff --cached --quiet; then
            echo "Nothing changed — no commit needed."
          else
            git commit -m "Auto data update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "Pushed updated data + HTML to main."
          fi
