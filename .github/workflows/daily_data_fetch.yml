name: Daily data fetch + rebuild

# ──────────────────────────────────────────────────────────────────────────────
# What this does
# ──────────────────────────────────────────────────────────────────────────────
# 1. Fetches the ECDC Andes hantavirus surveillance page once a day.
# 2. Parses confirmed / probable / suspected / inconclusive / deaths counts.
# 3. Updates data/cruise_outbreak_2026.json and data/outbreaks.json if the
#    numbers changed.
# 4. Rebuilds index.html AND zh/index.html from the updated data.
# 5. ALWAYS commits and pushes — the build timestamp in the footer changes on
#    every run, which keeps this workflow active and lets visitors see the page
#    was recently checked.
#
# Runs at 14:30 UTC (= 16:30 CET) — 30 min after ECDC publishes its daily
# update at 14:00 CET.  Also triggerable manually from the GitHub Actions tab.
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "30 14 * * *"   # 14:30 UTC daily (30 min after ECDC publishes)
  workflow_dispatch:          # allow manual trigger from GitHub Actions tab

permissions:
  contents: write             # needed to push data files + HTML

jobs:
  fetch-and-rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Step 1: fetch latest case counts and update JSON ──────────────────
      - name: Fetch latest data from ECDC + CDC
        run: python3 scripts/fetch_data.py

      # ── Step 2: rebuild both HTML pages (always produces new build timestamp)
      - name: Rebuild HTML (English + Chinese)
        run: python3 scripts/build_tracker.py

      # ── Step 3: always commit — timestamp in footer changes every run ─────
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage data files (only if changed) and HTML (always changed — new timestamp)
          git add data/cruise_outbreak_2026.json \
                  data/outbreaks.json \
                  index.html \
                  zh/index.html

          # Always commit — the build timestamp differs from the previous commit
          git commit -m "Daily rebuild $(date -u '+%Y-%m-%d') — ECDC checked at $(date -u '+%H:%M UTC')"
          git push
          echo "✓ Pushed daily rebuild to main."
